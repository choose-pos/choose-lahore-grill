mutation SendGiftCardOtp($phone: String!) {
  sendGiftCardOtp(phone: $phone)
}

mutation VerifyGiftCardOtp($phone: String!, $otp: String!) {
  verifyGiftCardOtp(phone: $phone, otp: $otp) {
    verified
    customerId
    firstName
    lastName
  }
}

mutation CreateGiftCardPurchaseIntent($input: PurchaseGiftCardInput!) {
  createGiftCardPurchaseIntent(input: $input) {
    clientSecret
    paymentIntentId
    stripeAccountId
  }
}

mutation ValidateGiftCardCode($code: String!) {
  validateGiftCardCode(code: $code) {
    valid
    amount
    remainingAmount
    appliedDiscount
    message
  }
}

mutation ApplyDiscountCode($code: String!) {
  applyDiscountCode(code: $code) {
    success
    message
    type
  }
}

mutation RemoveGiftCardFromCart {
  removeGiftCardFromCart
}

query GetMyGiftCards {
  getMyGiftCards {
    _id
    code
    amount
    remainingAmount
    design
    sendToSelf
    note
    expiryDate
    createdAt
    isActive
    senderInfo {
      firstName
      lastName
      email
    }
    recipientInfo {
      firstName
      lastName
      email
    }
  }
}

mutation ValidatePromoCode($code: String!) {
  validatePromoCode(code: $code) {
    _id
    code
    discountValue
    promoCodeDiscountType
    startDate
    uptoAmount
    endDate
    discountItem {
      name
      price
      image
    }
  }
}

query GetAllOwnedGiftCards {
  getAllOwnedGiftCards {
    _id
    code
    amount
    remainingAmount
    design
    recipientInfo {
      firstName
      lastName
      email
    }
    sendToSelf
    note
    expiryDate
    scheduledSendAt
    createdAt
    isActive
    status
  }
}

query fetchVisiblePromoCodes {
  fetchVisiblePromoCodes {
    _id
    code
    description
    isActive
    minCartValue
    promoCodeDiscountType
    discountValue
    couponUsageType
    uptoAmount
    discountItem {
      name
      desc
      price
      priceOptions {
        menuType
        price
      }
    }
  }
}

query getGiftCardByCode($paymentIntent: String!) {
  getGiftCardByCode(paymentIntent: $paymentIntent) {
    _id
    code
    amount
    remainingAmount
    design
    sendToSelf
    note
    expiryDate
    scheduledSendAt
    createdAt
    isActive
    status
    customerPaidAmount
    restaurantId
    loyaltyPointsEarned
    senderInfo {
      firstName
      lastName
      email
    }
    recipientInfo {
      firstName
      lastName
      email
    }
  }
}